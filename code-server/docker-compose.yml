version: "3.1"
services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    secrets:
      - code-server-password
    networks:
      - traefik-swarm-network
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
      labels:
        # Frontend
        - traefik.enable=true
        - traefik.docker.network=traefik-swarm-network
        - traefik.http.routers.code.rule=Host(`code-server.mcbourdeux-workstation.com`)
        - traefik.http.routers.code.entrypoints=websecure
        - traefik.http.routers.code.tls.certresolver=letsencrypt
        - traefik.http.routers.code.service=code
        - traefik.http.services.code.loadbalancer.server.port=8443
        - traefik.http.services.whoami-service.loadbalancer.sticky.cookie=true
        - traefik.http.services.whoami-service.loadbalancer.sticky.cookie.name=code_server_ha
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
      - PASSWORD_FILE=/run/secrets/code-server-password
      - SUDO_PASSWORD_FILE=/run/secrets/code-server-password
      - PROXY_DOMAIN=mcbourdeux-workstation.com #optional
      - DEFAULT_WORKSPACE=/config/workspace #optional
    volumes:
      - /datacenter2/docker/code-server:/config

networks:
  traefik-swarm-network:
    external: true

secrets:
  code-server-password:
    external: true
