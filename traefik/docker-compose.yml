version: '3'

services:
  traefik:
    image: traefik:v2.2.11
    networks:
      - traefik-swarm-network
    ports:
      - 80:80
      - 443:443
      - 8088:8088
    deploy:
      placement:
        constraints:
          - node.role==manager
          - node.labels.arch==amd64
      labels:
          - traefik.enable=true
          - traefik.http.middlewares.admin.basicauth.users=traefik-user:traefik-password
          - traefik.docker.network=traefik-swarm-network
      
          - traefik.http.routers.thisproxylocal.rule=Host(`103.82.24.123`)
          - traefik.http.routers.thisproxylocal.entryPoints=console
          - traefik.http.routers.thisproxylocal.service=api@internal
          - traefik.http.routers.thisproxylocal.middlewares=admin
      
          - traefik.http.services.thisproxytls.loadbalancer.server.port=8088
          - traefik.http.routers.thisproxytls.rule=Host(`traefik.gxcaothai.net`) || Host(`traefik.mcbourdeux-workstation.com`)
          - traefik.http.routers.thisproxytls.entrypoints=websecure
          - traefik.http.routers.thisproxytls.service=api@internal
          - traefik.http.routers.thisproxytls.middlewares=admin
          - traefik.http.routers.thisproxytls.tls.certresolver=letsencrypt
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.swarmMode=true
      
      - --entryPoints.console.address=:8088
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.web.http.redirections.entrypoint.permanent=true
      
      - --api=true
      - --api.insecure=true
      - --global.checkNewVersion=true
      - --log.level=DEBUG
      - --log.filePath=/logs/traefik.log
      - --accessLog.filePath=/logs/access.log
      - --accessLog.bufferingSize=100
      
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=cloudflare-email  # replace with your email
      - --certificatesresolvers.letsencrypt.acme.storage=acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.caserver=https://acme-v02.api.letsencrypt.org/directory
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /datacenter/docker/traefik/acme:/acme
      - /datacenter/docker/traefik/logs:/logs
    environment:
      - CF_API_EMAIL=clouflare-email
      - CF_API_KEY=cloudflare-api-key
    
  whoami:
    image: "traefik/whoami"
    deploy:
      placement:
        constraints:
          - node.role==worker
          - node.labels.arch==arm64
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-swarm-network
        - traefik.http.routers.whoami.rule=Host(`test.gxcaothai.net`)  
        - traefik.http.routers.whoami.entrypoints=websecure
        - traefik.http.routers.whoami.tls.certresolver=letsencrypt
    networks:
      - traefik-swarm-network
      
networks:
  traefik-swarm-network:
    external: true
    
secrets:
  cloudflare-api-key:
    external: true
  cloudflare-amil:
    external: true
  traefik-password:
    external: true
  traefik-user:
    external: true
